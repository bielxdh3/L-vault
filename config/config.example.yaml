vault_root: E:\LocalVault
viewer:
  host: 127.0.0.1
  port: 8787
  allow_lan: false
  page_size: 60
gmail:
  api_enabled: false
  credentials_file: E:\LocalVault\config\google_oauth_client_secret.json
  token_file: E:\LocalVault\config\gmail_token.json
  modify_remote: false
  batch_size: 100
photos:
  takeout_enabled: true
source_sync:
  enabled: true
  google_takeout_sources:
  - C:\Users\bielx\Downloads
safety:
  minimum_free_gb: 20
  hash_algorithm: sha256
  never_delete_sources: true
automation:
  task_prefix: LocalVault
  execution_time_limit_hours: 8
  tasks:
    daily_backup:
      enabled: true
      name: Daily Backup
      command: daily-backup
      frequency: daily
      time: 02:00
      days: []
    weekly_takeout:
      enabled: true
      name: Weekly Takeout Import
      command: auto-takeout
      frequency: weekly
      time: 03:00
      days:
      - Sunday
    verify_weekly:
      enabled: true
      name: Verify Weekly
      command: verify
      frequency: weekly
      time: 04:00
      days:
      - Sunday
